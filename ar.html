<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>ChemSim AR v2.0</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;

}

/*==========================
Panel
==========================*/

#panel{

    position:fixed;

    top:20px;

    right:20px;

    width:260px;

    background:rgba(15,23,42,.92);

    backdrop-filter:blur(12px);

    border-radius:18px;

    padding:18px;

    color:white;

    z-index:9999;

    box-shadow:0 12px 30px rgba(0,0,0,.45);

}

#panel h2{

    margin:0 0 18px;

    color:#38bdf8;

    text-align:center;

}

label{

    display:block;

    margin-top:14px;

    margin-bottom:6px;

    font-size:14px;

}

input[type=range]{

    width:100%;

}

.valor{

    text-align:center;

    color:#38bdf8;

    margin-top:5px;

    font-weight:bold;

    margin-bottom:10px;

}

</style>

</head>

<body>

<a-scene

embedded

vr-mode-ui="enabled:false"

arjs="sourceType:webcam; debugUIEnabled:false;">

<a-marker preset="hiro">

<!-- Entrada -->

<a-cylinder

radius="0.10"

height="0.30"

position="0 -0.15 0"

color="#64748b">

</a-cylinder>

<!-- Distribuidor -->

<a-cylinder

radius="0.32"

height="0.05"

position="0 -0.025 0"

color="#2d3342">

</a-cylinder>

<!-- Columna -->

<a-cylinder

id="wall"

radius="0.30"

height="3.0"

position="0 1.5 0"

color="#0ea5e9"

opacity="0.18"

material="side:double">

</a-cylinder>

<!-- Tapa -->

<a-cylinder

radius="0.32"

height="0.05"

position="0 3.0 0"

color="#475569">

</a-cylinder>

<!-- Flujo -->

<a-entity id="flowContainer"></a-entity>

<!-- Partículas -->

<a-entity id="particleContainer"></a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<div id="panel">

<h2>⚙ ChemSim AR</h2>

<label>Velocidad del gas</label>

<input
type="range"
id="sliderU"
min="0"
max="0.8"
step="0.001"
value="0.20">

<div
class="valor"
id="valorU">

0.200 m/s

</div>

<label>Radio activo</label>

<input
type="range"
id="sliderRadio"
min="0.20"
max="1.00"
step="0.01"
value="0.75">

<div
class="valor"
id="valorRadio">

75 %

</div>

<label>Densidad del gas</label>

<input
type="range"
id="sliderRho"
min="0.5"
max="5"
step="0.1"
value="1.2">

<div
class="valor"
id="valorRho">

1.2 kg/m³

</div>

<label>Viscosidad</label>

<input
type="range"
id="sliderMu"
min="0.00001"
max="0.00010"
step="0.000001"
value="0.000018">

<div
class="valor"
id="valorMu">

1.8×10⁻⁵ Pa·s

</div>

</div>

<script>

//======================================================
// ChemSim AR v2.0
// Variables principales
//======================================================

const H = 3.0;

const NUM_PARTICLES = 120;

const particleContainer =
document.getElementById("particleContainer");

const flowContainer =
document.getElementById("flowContainer");

const sliderU =
document.getElementById("sliderU");

const sliderRadio =
document.getElementById("sliderRadio");

const sliderRho =
document.getElementById("sliderRho");

const sliderMu =
document.getElementById("sliderMu");

//======================================================
// Mostrar valores
//======================================================

const valorU =
document.getElementById("valorU");

const valorRadio =
document.getElementById("valorRadio");

const valorRho =
document.getElementById("valorRho");

const valorMu =
document.getElementById("valorMu");

sliderU.oninput = ()=>{

    valorU.innerHTML =
    Number(sliderU.value).toFixed(3)
    +" m/s";

}

sliderRadio.oninput = ()=>{

    valorRadio.innerHTML =
    Math.round(sliderRadio.value*100)
    +" %";

}

sliderRho.oninput = ()=>{

    valorRho.innerHTML =
    Number(sliderRho.value).toFixed(1)
    +" kg/m³";

}

sliderMu.oninput = ()=>{

    valorMu.innerHTML =
    Number(sliderMu.value).toExponential(2)
    +" Pa·s";

}

//======================================================
// Crear partículas
//======================================================

const particles=[];

for(let i=0;i<NUM_PARTICLES;i++){

    let sphere=document.createElement("a-sphere");

    sphere.setAttribute("radius","0.012");

    sphere.setAttribute("color","#f59e0b");

    sphere.setAttribute("segments-width","8");

    sphere.setAttribute("segments-height","8");

    particleContainer.appendChild(sphere);

    particles.push({

        el:sphere,

        x:(Math.random()-0.5)*0.42,

        y:Math.random()*1.2,

        z:(Math.random()-0.5)*0.42,

        vx:0,

        vy:0,

        vz:0

    });

}

//======================================================
// Crear flechas
//======================================================

const arrows=[];

for(let i=0;i<30;i++){

    let cone=document.createElement("a-cone");

    cone.setAttribute("radius-bottom","0.012");

    cone.setAttribute("radius-top","0");

    cone.setAttribute("height","0.06");

    cone.setAttribute("color","#38bdf8");

    cone.setAttribute("opacity","0");

    flowContainer.appendChild(cone);

    arrows.push({

        el:cone,

        y:Math.random()*H,

        r:Math.random()*0.25,

        ang:Math.random()*Math.PI*2

    });

}

//======================================================
// Motor de fluidización
//======================================================

function animate(){

    const u = Number(sliderU.value);

    const radioActivo =
    Number(sliderRadio.value)*0.28;

    //--------------------------------------------------
    // Partículas
    //--------------------------------------------------

    particles.forEach(p=>{

        // velocidad ascendente

        p.vy = u*0.03;

        p.y += p.vy;

        // pequeño movimiento aleatorio

        p.x += (Math.random()-0.5)*0.002;

        p.z += (Math.random()-0.5)*0.002;

        // mantenerlas dentro del cilindro

        let r = Math.sqrt(p.x*p.x+p.z*p.z);

        if(r>radioActivo){

            let ang=Math.atan2(p.z,p.x);

            p.x=Math.cos(ang)*radioActivo;

            p.z=Math.sin(ang)*radioActivo;

        }

        // reiniciar cuando llegan arriba

        if(p.y>H){

            p.y=0;

            let ang=Math.random()*Math.PI*2;

            let rr=Math.random()*radioActivo;

            p.x=Math.cos(ang)*rr;

            p.z=Math.sin(ang)*rr;

        }

        p.el.object3D.position.set(

            p.x,

            p.y,

            p.z

        );

        // ESTE ES EL TAMAÑO REAL

        p.el.object3D.position.set(

    p.x,

    p.y,

    p.z

);
    });

    //--------------------------------------------------
    // Flechas del flujo
    //--------------------------------------------------

    arrows.forEach(a=>{

        if(u>0.001){

            a.y+=u*0.05;

            if(a.y>H){

                a.y=0;

                a.r=Math.random()*radioActivo;

                a.ang=Math.random()*Math.PI*2;

            }

            let x=Math.cos(a.ang)*a.r;

            let z=Math.sin(a.ang)*a.r;

            a.el.setAttribute(

                "position",

                `${x} ${a.y} ${z}`

            );

            a.el.setAttribute(

                "opacity",

                Math.min(u*2,0.6)

            );

        }

        else{

            a.el.setAttribute(

                "opacity",

                0

            );

        }

    });

    requestAnimationFrame(animate);

}

animate();

//======================================================
// Comunicación futura con index.html
//======================================================

window.addEventListener("message",(e)=>{

    if(!e.data) return;

    // Reservado para sincronizar con index.html
    // en la siguiente versión.

});

//======================================================
// Enviar cambios al index.html (si existe)
//======================================================

function enviar(variable,valor){

    if(window.parent!==window){

        window.parent.postMessage({

            type:"AR_CONTROL",

            variable:variable,

            value:valor

        },"*");

    }

}

sliderU.addEventListener("input",()=>{

    enviar("u",Number(sliderU.value));

});

sliderRadio.addEventListener("input",()=>{

    enviar("rflujo",Number(sliderRadio.value));

});

sliderRho.addEventListener("input",()=>{

    enviar("rho_g",Number(sliderRho.value));

});

sliderMu.addEventListener("input",()=>{

    enviar("mu",Number(sliderMu.value));

});

</script>

</body>

</html>
